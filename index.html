<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding 스마트 매장 음악 시스템</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 650px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .question-group { margin-bottom: 25px; }
        .question-title { font-weight: bold; margin-bottom: 10px; font-size: 1.1em; }
        .btn-option {
            padding: 10px 18px; margin: 0 5px 10px 0;
            border: 2px solid #3498db; background-color: white;
            color: #3498db; border-radius: 8px; cursor: pointer;
            font-size: 1em; transition: all 0.2s ease;
        }
        .btn-option:hover { background-color: #ebf5fb; }
        .btn-option.selected { background-color: #3498db; color: white; }
        #generate-btn {
            width: 100%; padding: 15px; background-color: #2ecc71;
            color: white; border: none; border-radius: 8px;
            font-size: 1.2em; cursor: pointer; margin-top: 10px; font-weight: bold;
        }
        #generate-btn:hover { background-color: #27ae60; }
        
        /* 다이렉트 링크 카드 디자인 */
        #result-area {
            margin-top: 30px; padding: 40px 20px; background-color: #2c3e50;
            border-radius: 12px; display: none; color: white; text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        #out-query { font-size: 1.5em; margin: 0 0 10px 0; color: #ecf0f1; }
        #out-time { font-size: 1em; color: #1abc9c; margin-bottom: 30px; display: block; }
        
        /* 🌟 거대한 재생 버튼 */
        .play-btn-massive {
            display: inline-block; background-color: #e74c3c; color: white;
            padding: 18px 40px; border-radius: 50px; font-size: 1.3em; font-weight: bold;
            text-decoration: none; transition: transform 0.3s ease, background-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(231, 76, 60, 0.4);
        }
        .play-btn-massive:hover {
            background-color: #c0392b; transform: scale(1.05);
        }
        .safe-notice {
            margin-top: 25px; font-size: 0.85em; color: #bdc3c7;
        }
    </style>
</head>
<body>

    <h1>🎵 Vibe Coding 프로 시스템</h1>

    <div class="question-group">
        <div class="question-title">1. 현재 업종은 무엇인가요?</div>
        <button class="btn-option" onclick="selectOption('store', this, '카페')">카페</button>
        <button class="btn-option" onclick="selectOption('store', this, '레스토랑')">레스토랑</button>
        <button class="btn-option" onclick="selectOption('store', this, '술집')">술집</button>
    </div>

    <div class="question-group">
        <div class="question-title">2. 현재 계절은?</div>
        <button class="btn-option" onclick="selectOption('season', this, '봄')">봄</button>
        <button class="btn-option" onclick="selectOption('season', this, '여름')">여름</button>
        <button class="btn-option" onclick="selectOption('season', this, '가을')">가을</button>
        <button class="btn-option" onclick="selectOption('season', this, '겨울')">겨울</button>
    </div>

    <div class="question-group">
        <div class="question-title">3. 오늘의 날씨는?</div>
        <button class="btn-option" onclick="selectOption('weather', this, '맑음')">맑음</button>
        <button class="btn-option" onclick="selectOption('weather', this, '흐림')">흐림</button>
        <button class="btn-option" onclick="selectOption('weather', this, '비')">비</button>
        <button class="btn-option" onclick="selectOption('weather', this, '눈')">눈</button>
    </div>

    <button id="generate-btn" onclick="generatePlaylist()">음악 큐레이션 받기</button>

    <div id="result-area">
        <h3 id="out-query"></h3>
        <span id="out-time"></span>
        
        <!-- 이 버튼을 누르면 100% 안전한 유튜브 검색 결과 창으로 이동합니다 -->
        <a id="direct-youtube-link" href="#" target="_blank" class="play-btn-massive">
            ▶ 맞춤 플레이리스트 열기
        </a>
        
        <p class="safe-notice">※ 오류 없이 항상 재생 가능한 최신 음악 목록을 보여줍니다.</p>
    </div>

    <script>
        let userChoices = { store: '', season: '', weather: '' };

        function selectOption(category, buttonElement, value) {
            userChoices[category] = value;
            let siblingButtons = buttonElement.parentElement.querySelectorAll('.btn-option');
            siblingButtons.forEach(btn => btn.classList.remove('selected'));
            buttonElement.classList.add('selected');
        }

        function generatePlaylist() {
            // 방어 코드: 항목을 다 안 골랐을 때
            if (!userChoices.store || !userChoices.season || !userChoices.weather) {
                alert("업종, 계절, 날씨를 모두 선택해 주세요!");
                return;
            }

            // 현재 시간 계산
            const hour = new Date().getHours();
            let timeSlot = "저녁/심야";
            if (hour >= 11 && hour < 15) { timeSlot = "점심"; } 
            else if (hour >= 15 && hour < 17) { timeSlot = "브레이크타임"; }

            // 화면에 띄워줄 문구 업데이트
            document.getElementById('out-query').innerText = `${userChoices.store} · ${userChoices.season} ${userChoices.weather} 무드`;
            document.getElementById('out-time').innerText = `타겟 시간대: ${timeSlot} (${hour}시)`;

            // 🌟 핵심 로직: 스마트 검색어 자동 조합
            // 업종에 따라 음악 장르를 조금 더 디테일하게 붙여줍니다.
            let musicGenre = "매장 음악 플레이리스트";
            if (userChoices.store === "카페") musicGenre = "재즈 로파이 감성 플레이리스트";
            if (userChoices.store === "레스토랑") musicGenre = "고급 다이닝 클래식 연주곡";
            if (userChoices.store === "술집") musicGenre = "분위기 좋은 라운지 팝 힙합";

            // 예: "봄 맑음 카페 재즈 로파이 감성 플레이리스트"
            const finalQuery = `${userChoices.season} ${userChoices.weather} ${userChoices.store} ${musicGenre}`;
            
            // 🌟 특정 영상 주소(watch?v=)가 아닌 검색 주소(results?search_query=)를 만듭니다.
            const targetUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(finalQuery)}`;

            // 대형 버튼에 100% 고장 나지 않는 검색 링크 심어주기
            document.getElementById('direct-youtube-link').href = targetUrl;

            // 결과 화면 보여주기
            document.getElementById('result-area').style.display = 'block';
        }
    </script>
</body>
</html>
